  function todayKey() {
    const d = new Date();
    return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
  }
  function uid() {
    try { return (localStorage.getItem('wt_uid')) || (function(){const u=crypto.randomUUID(); localStorage.setItem('wt_uid', u); return u;})(); } catch(e) { return String(Math.random()).slice(2); }
  }

  async function checkGeo() {
    if (!US_ONLY) return true;
    try {
      const res = await fetch('http://ip-api.com/json/?fields=status,country,countryCode,query', { cache: 'no-store' });
      const data = await res.json();
      return data && data.status === 'success' && data.countryCode === 'US';
    } catch (e) {
      return false;
    }
  }

  function allowedOncePerUser() {
    try {
      const u = uid();
      const key = 'wt_once_' + PAGE_ID;
      if (localStorage.getItem(key)) return false;
      localStorage.setItem(key, u + ':' + todayKey());
      return true;
    } catch(e) { return true; }
  }

  async function initGate() {
    const statusEl = document.getElementById('status');
    const ctaBtn = document.getElementById('cta');

    const geoOk = await checkGeo();
    if (!geoOk) {

    }
    if (!allowedOncePerUser()) {
